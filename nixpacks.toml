# nixpacks.toml — Railway build configuration
# Nixpacks auto-detects Python from requirements.txt

[phases.setup]
aptPkgs = ["libmupdf-dev", "mupdf-tools", "build-essential"]

[phases.build]
cmds = [
    "mkdir -p uploads uploads/telegram logs"
]

[start]
cmd = "uvicorn worker.main:app --host 0.0.0.0 --port ${PORT:-8000}"
