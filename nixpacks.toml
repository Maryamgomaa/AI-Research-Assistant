# nixpacks.toml — Railway Nixpacks build config

[phases.setup]
aptPkgs = ["libmupdf-dev", "mupdf-tools"]

[phases.install]
cmds = ["python -m pip install -r requirements.txt"]

# Explicitly empty build phase to override any cached build.sh
[phases.build]
cmds = []

[start]
cmd = "python -m uvicorn worker.main:app --host 0.0.0.0 --port ${PORT:-8000}"
